<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../communs_styles/back_style.css">
    <link rel="stylesheet" href="../communs_styles/decks_style.css">
    <link rel="stylesheet" href="../communs_styles/loader.css">
</head>
<body>
    <h1>Kikisé avek image pixelisé</h1>

    <!----------------BACK----------------->
    <button id="back">↩ Retour</button>
    <!----------------BACK----------------->

    <!----------------DECKS----------------->
    <button id="decks">Choisirs les decks</button>

    <div id="deck-container">
        <button id="naruto-decks">Decks Naruto</button>
        <button id="jojo-decks">Decks Jojo</button>

        <button id="validate">Valider</button>

         <!--PERSONNAGES DE NARUTO-->
        <button id="naruto-classic" class="character">Classics Characters</button>
        <button id="naruto-7epeistes" class="character">7 épéistes Characters</button>
        <button id="naruto-pain" class="character">Pain Characters</button>
        <button id="naruto-bidjus-et-invocations" class="character">Bidju & Invocation</button>
        <button id="naruto-quator" class="character">Quator Characters</button>

        <!--PERSONNAGES DE JOJO-->
        <button id="jojo-characters" class="character">Personnages</button>
        <button id="jojo-stands" class="character">Stands</button>

        <button id="retour" class="retour">✘</button>
    </div>
    <!----------------DECKS----------------->

    <p id="start-pixel-p">Pixel de depart <span>(200 de base)</span></p>
    <input id="start-pixel-input" type="number" min="1" max="500" value="200">
    <p id="pixel-per-fautes-p">Pixel en moins par fautes <span>(20 de base)</span></p>
    <input id="pixel-per-fautes-input" type="number" min="1" max="100" value="20">
    <button id="done">done</button>

    <div id="game-board">

        <button id="refresh-button">refresh</button> <!--Genere un nouveau personnage-->

        <div id="image-container">
            <img alt="" id="pixelated-image">

            <div class="guess-row">
                <div id="autocomplete-section">
                    <input type="text" id="guess-input" placeholder="Devinez le personnage..." autocomplete="off">
                    <div id="dd"></div>
                </div>
                <button id="guess-button">Devinez</button>
            </div>
        </div>

        <div id="result">
            <!--ici apparaitra l'historique des devinettes-->
            <h1 id="historique-title">Historique des devinettes | attemps : 0</h1>

            <div id="historique-container"></div>
        </div>
    </div>

    <script src="../communs_scripts/back.js"></script>
    <script src="../anime_characters/characters_loader.js"></script>
    <script src="script.js"></script>
    <script src="../communs_scripts/decks.js"></script>
</body>
</html>
