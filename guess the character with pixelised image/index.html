<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Kikisé avek image pixelisé</h1>

    <div id="game-board">

        <button id="refresh-button">refresh</button> <!--Genere un nouveau personnage-->

        <div id="image-container">
            <img alt="" id="pixelated-image">

            <div class="guess-row">
                <div id="autocomplete-section">
                    <input type="text" id="guess-input" placeholder="Devinez le personnage..." autocomplete="off">
                    <div id="dd"></div>
                </div>
                <button id="guess-button">Devinez</button>
            </div>
        </div>

        <div id="result">
            <!--ici apparaitra l'historique des devinettes-->
            <h1 id="historique-title">Historique des devinettes | attemps : 0</h1>

            <div id="historique-container"></div>
        </div>
    </div>



    <script type="module" src="script.js"></script>
</body>
</html>
